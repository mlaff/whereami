<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Where Am I">
<meta name="theme-color" content="#0b0d17">
<title>What Neighborhood?</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  :root {
    --bg: #0b0d17;
    --accent: #6c8cff;
    --accent-2: #a06cff;
    --text: #f2f4ff;
    --muted: #9aa0bd;
    --good: #4fd18b;
    --warn: #ffcc66;
    --glass: rgba(19, 22, 38, 0.72);
    --glass-solid: rgba(16, 19, 32, 0.92);
    --glass-brd: rgba(255, 255, 255, 0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Map ---------- */
  #map {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 0;
  }
  .leaflet-control-attribution {
    background: rgba(11, 13, 23, 0.6) !important;
    color: #6b7091 !important;
    backdrop-filter: blur(6px);
    font-size: 10px !important;
  }
  .leaflet-control-attribution a { color: #8b90b8 !important; }
  .leaflet-bar a {
    background: var(--glass) !important;
    color: var(--text) !important;
    border-color: var(--glass-brd) !important;
    backdrop-filter: blur(10px);
    width: 40px !important;
    height: 40px !important;
    line-height: 40px !important;
    font-size: 22px !important;
  }

  /* Vignettes so card/search read against any map area */
  .scrim {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 46%;
    pointer-events: none;
    background: linear-gradient(to top, rgba(11,13,23,0.85) 0%, rgba(11,13,23,0.0) 100%);
    z-index: 400;
  }
  .scrim-top {
    position: fixed;
    left: 0; right: 0; top: 0;
    height: 140px;
    pointer-events: none;
    background: linear-gradient(to bottom, rgba(11,13,23,0.75) 0%, rgba(11,13,23,0.0) 100%);
    z-index: 400;
  }

  /* ---------- "You are here" marker ---------- */
  .me-dot {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--accent);
    border: 3px solid #fff;
    box-shadow: 0 0 0 2px rgba(108,140,255,0.6), 0 4px 12px rgba(0,0,0,0.5);
    position: relative;
  }
  .me-dot::after {
    content: "";
    position: absolute;
    inset: -11px;
    border-radius: 50%;
    background: rgba(108,140,255,0.45);
    animation: ping 2.2s cubic-bezier(0, 0, 0.2, 1) infinite;
    z-index: -1;
  }
  @keyframes ping {
    0%   { transform: scale(0.6); opacity: 0.8; }
    80%  { transform: scale(2.6); opacity: 0; }
    100% { transform: scale(2.6); opacity: 0; }
  }

  /* ---------- Searched-place pin ---------- */
  .pin-wrap {
    width: 30px; height: 40px;
    display: flex; align-items: flex-start; justify-content: center;
    animation: drop 0.55s cubic-bezier(0.2, 1.2, 0.4, 1);
    transform-origin: center bottom;
  }
  .pin {
    width: 26px; height: 26px;
    background: linear-gradient(135deg, var(--accent-2), var(--accent));
    border: 2.5px solid #fff;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    box-shadow: 0 5px 12px rgba(0,0,0,0.55);
  }
  @keyframes drop {
    0%   { transform: translateY(-38px) scale(0.7); opacity: 0; }
    60%  { transform: translateY(0) scale(1); opacity: 1; }
    75%  { transform: translateY(-6px) scale(1); }
    100% { transform: translateY(0) scale(1); }
  }

  /* ---------- Search bar ---------- */
  .searchwrap {
    position: fixed;
    top: calc(env(safe-area-inset-top) + 12px);
    left: 12px; right: 12px;
    z-index: 560;
    max-width: 560px;
    margin: 0 auto;
  }
  .searchbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
    background: var(--glass);
    border: 1px solid var(--glass-brd);
    border-radius: 16px;
    backdrop-filter: blur(16px) saturate(1.2);
    -webkit-backdrop-filter: blur(16px) saturate(1.2);
    box-shadow: 0 10px 34px rgba(0,0,0,0.4);
  }
  .searchbar svg.ico { width: 20px; height: 20px; stroke: var(--muted); fill: none; stroke-width: 2; flex: none; }
  .searchbar input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: inherit;
    font-size: 16px; /* >=16px stops iOS from auto-zooming the page on focus */
    min-width: 0;
  }
  .searchbar input::placeholder { color: var(--muted); }
  .searchbar .clear {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.10);
    color: var(--text);
    font-size: 15px;
    line-height: 1;
    cursor: pointer;
    display: none;
    flex: none;
  }
  .searchbar .clear.show { display: block; }
  .searchbar .spin {
    width: 18px; height: 18px; flex: none;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .searchbar .spin.show { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .results {
    margin-top: 8px;
    background: var(--glass-solid);
    border: 1px solid var(--glass-brd);
    border-radius: 16px;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow: 0 14px 40px rgba(0,0,0,0.5);
    overflow: hidden;
    max-height: 46vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: none;
  }
  .results.show { display: block; }
  .results .row {
    padding: 12px 15px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    cursor: pointer;
  }
  .results .row:last-child { border-bottom: none; }
  .results .row:active { background: rgba(108,140,255,0.16); }
  .results .row .r-main { font-size: 15px; font-weight: 600; }
  .results .row .r-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .results .empty { padding: 14px 15px; font-size: 13px; color: var(--muted); }

  /* ---------- Recenter / locate FAB ---------- */
  .fab {
    position: fixed;
    right: 16px;
    bottom: calc(env(safe-area-inset-bottom) + 220px);
    z-index: 550;
    width: 50px; height: 50px;
    border-radius: 50%;
    background: var(--glass);
    border: 1px solid var(--glass-brd);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 26px rgba(0,0,0,0.45);
    cursor: pointer;
    opacity: 0;
    transform: scale(0.7);
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.2,0.9,0.3,1.3);
  }
  .fab.show { opacity: 1; transform: scale(1); pointer-events: auto; }
  .fab:active { transform: scale(0.9); }
  .fab svg { width: 26px; height: 26px; stroke: var(--accent); fill: none; stroke-width: 2; }

  /* ---------- Bottom card ---------- */
  .card {
    position: fixed;
    left: 12px; right: 12px;
    bottom: calc(env(safe-area-inset-bottom) + 12px);
    z-index: 500;
    background: var(--glass);
    border: 1px solid var(--glass-brd);
    border-radius: 26px;
    backdrop-filter: blur(22px) saturate(1.2);
    -webkit-backdrop-filter: blur(22px) saturate(1.2);
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    padding: 18px 22px 18px;
    max-width: 560px;
    margin: 0 auto;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  }

  .eyebrow {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
  }
  .eyebrow .lead {
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .statuschip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }
  .statuschip .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .statuschip .dot.live { background: var(--good); animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.35;} }

  .place {
    font-size: clamp(30px, 9vw, 46px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    word-break: break-word;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .place .flag { font-size: 0.85em; line-height: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4)); }
  .place.changing { animation: popIn 0.5s cubic-bezier(0.2,0.9,0.3,1.3); }
  @keyframes popIn {
    0%   { transform: translateY(10px) scale(0.96); opacity: 0; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }

  .breadcrumb {
    margin-top: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }
  .breadcrumb .crumb {
    font-size: 13px;
    color: var(--text);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 4px 10px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .breadcrumb .crumb .lbl {
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-right: 5px;
  }
  .breadcrumb .sep { color: var(--muted); opacity: 0.5; font-size: 12px; }

  .cta {
    margin-top: 16px;
    width: 100%;
    appearance: none;
    border: none;
    border-radius: 16px;
    padding: 16px;
    font-size: 17px;
    font-weight: 800;
    font-family: inherit;
    color: #0b0d17;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    cursor: pointer;
    box-shadow: 0 10px 26px rgba(108,140,255,0.4);
    transition: transform 0.08s ease;
  }
  .cta:active { transform: scale(0.98); }

  .hint {
    margin-top: 12px;
    font-size: 14px;
    color: var(--muted);
    line-height: 1.5;
  }
  .hint.error { color: var(--warn); }

  .shimmer {
    display: inline-block;
    height: 0.9em;
    width: 62%;
    border-radius: 8px;
    background: linear-gradient(90deg, rgba(255,255,255,0.06) 25%, rgba(255,255,255,0.16) 37%, rgba(255,255,255,0.06) 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
  }
  @keyframes shimmer { 0%{background-position:100% 0;} 100%{background-position:-100% 0;} }

  /* ---------- Welcome toast ---------- */
  .toast {
    position: fixed;
    top: calc(env(safe-area-inset-top) + 76px);
    left: 50%;
    transform: translateX(-50%) translateY(-14px);
    z-index: 600;
    padding: 12px 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #0b0d17;
    font-weight: 800;
    font-size: 15px;
    border-radius: 999px;
    box-shadow: 0 12px 34px rgba(108,140,255,0.45);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.2,0.9,0.3,1.3);
    white-space: nowrap;
    max-width: 90vw;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .hidden { display: none !important; }

  /* While the map is panning/zooming, drop the expensive blur so it stays smooth.
     Surfaces fall back to a near-solid tint that's still readable. */
  body.moving .card,
  body.moving .searchbar,
  body.moving .results,
  body.moving .fab {
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
  }
  body.moving .card { background: var(--glass-solid) !important; }
</style>
</head>
<body>
  <div id="map"></div>
  <div class="scrim"></div>
  <div class="scrim-top"></div>

  <div class="searchwrap">
    <div class="searchbar">
      <svg class="ico" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.3-4.3"></path></svg>
      <input id="search" type="search" inputmode="search" enterkeyhint="search"
             autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
             placeholder="Search an address or place…" aria-label="Search an address or place">
      <div class="spin" id="spin"></div>
      <button class="clear" id="clear" aria-label="Clear search">✕</button>
    </div>
    <div class="results" id="results"></div>
  </div>

  <div class="toast" id="toast"></div>

  <button class="fab" id="fab" aria-label="Recenter map">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"></circle><path d="M12 2v3.5M12 18.5V22M2 12h3.5M18.5 12H22"></path></svg>
  </button>

  <div class="card" id="card">
    <div class="eyebrow">
      <span class="lead" id="eyebrow">You are in</span>
      <span class="statuschip"><span class="dot" id="statusDot"></span><span id="statusText">Ready when you are</span></span>
    </div>
    <div class="place" id="place">Where am I?</div>
    <div class="breadcrumb" id="breadcrumb"></div>
    <button class="cta" id="cta">Find my neighborhood</button>
    <div class="hint" id="hint">See exactly which neighborhood you're standing in — or search any address, anywhere in the world.</div>
  </div>

<script>
(function () {
  "use strict";

  // Address fields from most-specific to broadest, with the label shown to the user.
  // Nominatim returns different keys per country, so we probe several per tier and
  // take the first present, then de-duplicate identical values across tiers.
  const TIERS = [
    { label: "Sub-area",     keys: ["neighbourhood"] },
    { label: "Neighborhood", keys: ["quarter"] },
    { label: "Area",         keys: ["suburb", "city_district", "borough"] },
    { label: "City",         keys: ["city", "town", "village", "municipality", "hamlet"] },
    { label: "Region",       keys: ["state", "region", "province"] },
    { label: "Country",      keys: ["country"] }
  ];

  const $ = (id) => document.getElementById(id);
  const els = {
    map: $("map"), place: $("place"), eyebrow: $("eyebrow"), breadcrumb: $("breadcrumb"),
    cta: $("cta"), hint: $("hint"), statusDot: $("statusDot"), statusText: $("statusText"),
    toast: $("toast"), fab: $("fab"),
    search: $("search"), clear: $("clear"), spin: $("spin"), results: $("results")
  };

  const MIN_MOVE_METERS = 35;   // re-geocode only after moving this far
  const MIN_INTERVAL_MS = 8000; // ...or after this long (respects Nominatim rate limit)
  const FOLLOW_MIN_METERS = 8;  // ignore GPS jitter smaller than this when auto-following

  let map, meMarker, accuracyCircle, pinMarker;
  let watchId = null;
  let lastFix = null;            // { lat, lon } — most recent live GPS fix
  let lastPanCenter = null;      // where we last auto-centered, to suppress jitter pans
  let lastGeocodeTime = 0;
  let lastLiveAddress = null;    // remembered so returning from a search is instant
  let following = true;          // auto-center the map on the live fix
  let selfMoving = false;        // true while WE move the map, so user-gesture detection ignores it
  let mode = "idle";             // "idle" | "live" | "pinned" (viewing a searched place)
  let topPlaceName = null;       // headline place, to detect crossing into a new area
  let hasCard = false;
  let toastTimer = null;
  let searchTimer = null;
  let searchAbort = null;

  // ---------- Map setup ----------
  function initMap() {
    map = L.map("map", {
      zoomControl: false,
      attributionControl: true,
      worldCopyJump: true,
      bounceAtZoomLimits: false
    }).setView([20, 0], 2);

    L.control.zoom({ position: "topright" }).addTo(map);

    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      attribution: '&copy; <a href="https://openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: "abcd",
      maxZoom: 20
    }).addTo(map);

    // Kill the pricey backdrop-filter blur while the map is in motion, restore after.
    const onMoveStart = () => document.body.classList.add("moving");
    const onMoveEnd = () => { document.body.classList.remove("moving"); selfMoving = false; };
    map.on("movestart zoomstart", onMoveStart);
    map.on("moveend zoomend", onMoveEnd);

    // A genuine user gesture (drag, or a pinch/scroll we didn't initiate) drops
    // auto-follow so incoming GPS fixes stop yanking the map from under them.
    map.on("dragstart", userTookControl);
    map.on("zoomstart", function () { if (!selfMoving) userTookControl(); });
  }

  function userTookControl() {
    if (mode === "live" && following) {
      following = false;
      updateFab();
    }
  }

  // Wrap any programmatic map move so the gesture detector ignores it.
  function selfMove(fn) {
    selfMoving = true;
    fn();
  }

  // ---------- Helpers ----------
  function flagEmoji(cc) {
    if (!cc || cc.length !== 2) return "";
    const base = 0x1F1E6;
    return cc.toUpperCase().replace(/./g, (ch) =>
      String.fromCodePoint(base + ch.charCodeAt(0) - 65));
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  function distanceMeters(a, b) {
    const R = 6371000;
    const toRad = (d) => d * Math.PI / 180;
    const dLat = toRad(b.lat - a.lat);
    const dLon = toRad(b.lon - a.lon);
    const lat1 = toRad(a.lat), lat2 = toRad(b.lat);
    const h = Math.sin(dLat / 2) ** 2 +
              Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(h));
  }

  function prettyDistance(meters) {
    if (meters < 1000) return Math.round(meters) + " m away";
    return (meters / 1000).toFixed(meters < 10000 ? 1 : 0) + " km away";
  }

  function buildChain(address) {
    const chain = [];
    const seen = new Set();
    for (const tier of TIERS) {
      for (const key of tier.keys) {
        const value = address[key];
        if (value && !seen.has(value)) {
          seen.add(value);
          chain.push({ label: tier.label, value: value });
          break;
        }
      }
    }
    return chain;
  }

  function setStatus(text, live) {
    els.statusText.textContent = text;
    els.statusDot.className = "dot" + (live ? " live" : "");
  }

  function showToast(msg) {
    els.toast.textContent = msg;
    els.toast.classList.add("show");
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => els.toast.classList.remove("show"), 3200);
  }

  // ---------- Rendering the card ----------
  function render(address, options) {
    options = options || {};
    const chain = buildChain(address);
    els.cta.classList.add("hidden");

    if (chain.length === 0) {
      els.eyebrow.textContent = "Hmm";
      els.place.textContent = "Unknown area";
      els.breadcrumb.innerHTML = "";
      els.hint.textContent = "No named place here in OpenStreetMap.";
      els.hint.classList.remove("hidden");
      return;
    }
    els.hint.classList.add("hidden");
    els.eyebrow.textContent = options.pinned ? "Looking at" : "You are in";

    const flag = flagEmoji(address.country_code);
    const head = chain[0].value;

    const changed = head !== topPlaceName;
    els.place.innerHTML = escapeHtml(head) +
      (flag ? ' <span class="flag">' + flag + "</span>" : "");
    if (changed) {
      els.place.classList.remove("changing");
      void els.place.offsetWidth; // restart animation
      els.place.classList.add("changing");
      if (hasCard && !options.pinned) showToast("Welcome to " + head + (flag ? " " + flag : ""));
    }
    topPlaceName = head;

    els.breadcrumb.innerHTML = chain.map((c, i) =>
      (i > 0 ? '<span class="sep">›</span>' : "") +
      '<span class="crumb"><span class="lbl">' + c.label + "</span>" +
      escapeHtml(c.value) + "</span>"
    ).join("");

    hasCard = true;
  }

  function showLookingUp(pinned) {
    els.eyebrow.textContent = pinned ? "Looking at" : "Locating";
    els.place.innerHTML = '<span class="shimmer"></span>';
    els.breadcrumb.innerHTML = "";
    els.hint.classList.add("hidden");
    els.cta.classList.add("hidden");
  }

  // ---------- Markers ----------
  function updateMeMarker(lat, lon, accuracy) {
    const latlng = [lat, lon];
    if (!meMarker) {
      const icon = L.divIcon({
        className: "", html: '<div class="me-dot"></div>',
        iconSize: [22, 22], iconAnchor: [11, 11]
      });
      meMarker = L.marker(latlng, { icon: icon, interactive: false, keyboard: false }).addTo(map);
      accuracyCircle = L.circle(latlng, {
        radius: accuracy, color: "#6c8cff", weight: 1,
        fillColor: "#6c8cff", fillOpacity: 0.10, opacity: 0.35, interactive: false
      }).addTo(map);
    } else {
      meMarker.setLatLng(latlng);
      accuracyCircle.setLatLng(latlng);
      accuracyCircle.setRadius(accuracy);
    }
  }

  function setPin(lat, lon) {
    const latlng = [lat, lon];
    const icon = L.divIcon({
      className: "", html: '<div class="pin-wrap"><div class="pin"></div></div>',
      iconSize: [30, 40], iconAnchor: [15, 38]
    });
    if (!pinMarker) pinMarker = L.marker(latlng, { icon: icon, interactive: false, keyboard: false }).addTo(map);
    else { pinMarker.setIcon(icon); pinMarker.setLatLng(latlng); } // re-set icon to replay the drop
  }

  function clearPin() {
    if (pinMarker) { map.removeLayer(pinMarker); pinMarker = null; }
  }

  // ---------- Geocoding ----------
  async function reverseGeocode(lat, lon) {
    const url = "https://nominatim.openstreetmap.org/reverse" +
      "?format=jsonv2&zoom=18&addressdetails=1&accept-language=en" +
      "&lat=" + encodeURIComponent(lat) + "&lon=" + encodeURIComponent(lon);
    const res = await fetch(url, { headers: { "Accept": "application/json" } });
    if (!res.ok) throw new Error("Lookup failed (" + res.status + ")");
    const data = await res.json();
    if (!data || !data.address) throw new Error("No address found for this spot.");
    return data.address;
  }

  async function forwardGeocode(query, signal) {
    const url = "https://nominatim.openstreetmap.org/search" +
      "?format=jsonv2&addressdetails=1&limit=6&accept-language=en&q=" + encodeURIComponent(query);
    const res = await fetch(url, { headers: { "Accept": "application/json" }, signal: signal });
    if (!res.ok) throw new Error("Search failed (" + res.status + ")");
    return res.json();
  }

  // ---------- Live position handling ----------
  async function handlePosition(pos) {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    const accuracy = Math.max(1, pos.coords.accuracy || 25);
    const now = Date.now();
    const firstTime = !lastFix;

    updateMeMarker(lat, lon, accuracy);

    // Auto-follow, but ignore GPS jitter to avoid constant micro-pans.
    if (firstTime) {
      selfMove(() => map.flyTo([lat, lon], 15, { duration: 1.4 }));
      lastPanCenter = { lat, lon };
    } else if (following && (!lastPanCenter || distanceMeters(lastPanCenter, { lat, lon }) > FOLLOW_MIN_METERS)) {
      selfMove(() => map.panTo([lat, lon], { animate: true, duration: 0.5 }));
      lastPanCenter = { lat, lon };
    }

    if (mode === "live") {
      setStatus("Live · accurate to ~" + Math.round(accuracy) + " m", true);
    }

    const prevFix = lastFix;
    lastFix = { lat, lon };
    if (mode === "pinned") { updateFab(); return; } // keep marker fresh, but don't touch the searched card

    // Skip redundant reverse-geocode calls when barely moved and recently fetched.
    if (prevFix) {
      const moved = distanceMeters(prevFix, { lat, lon });
      if (moved < MIN_MOVE_METERS && (now - lastGeocodeTime) < MIN_INTERVAL_MS) return;
    }

    if (firstTime) showLookingUp(false);
    try {
      const address = await reverseGeocode(lat, lon);
      lastGeocodeTime = Date.now();
      lastLiveAddress = address;
      if (mode === "live") render(address, { pinned: false });
    } catch (err) {
      if (!hasCard) {
        els.eyebrow.textContent = "Hmm";
        els.place.textContent = "Couldn't look that up";
        els.hint.textContent = err.message + " Try again in a moment.";
        els.hint.classList.remove("hidden");
      }
      setStatus(err.message, false);
    }
  }

  function handleError(err) {
    let msg;
    switch (err.code) {
      case err.PERMISSION_DENIED:
        msg = "Location permission denied. Enable it in Settings → Safari and reload — or just search an address above.";
        break;
      case err.POSITION_UNAVAILABLE:
        msg = "Couldn't determine your location. Try again, or search an address above.";
        break;
      case err.TIMEOUT:
        msg = "Location request timed out.";
        break;
      default:
        msg = "Location isn't available. You can still search any address above.";
    }
    if (mode !== "pinned") {
      setStatus("Location off", false);
      els.eyebrow.textContent = "Heads up";
      els.place.textContent = "Location needed";
      els.hint.textContent = msg;
      els.hint.classList.remove("hidden");
      els.cta.classList.remove("hidden");
      els.cta.textContent = "Try again";
    }
  }

  const geoOptions = { enableHighAccuracy: true, timeout: 15000, maximumAge: 4000 };

  function startWatch() {
    if (watchId !== null) return;
    watchId = navigator.geolocation.watchPosition(handlePosition, handleError, geoOptions);
  }

  function locate() {
    if (!("geolocation" in navigator)) { handleError({ code: 0 }); return; }
    mode = "live";
    following = true;
    setStatus("Getting your location…", false);
    showLookingUp(false);
    navigator.geolocation.getCurrentPosition(function (pos) {
      handlePosition(pos);
      startWatch();
    }, handleError, geoOptions);
  }

  // ---------- Search ----------
  function renderResults(items) {
    if (!items || items.length === 0) {
      els.results.innerHTML = '<div class="empty">No matches. Try a fuller address or a nearby landmark.</div>';
      els.results.classList.add("show");
      return;
    }
    els.results.innerHTML = items.map((item, i) => {
      const parts = (item.display_name || "").split(",");
      const main = parts.shift().trim();
      const sub = parts.join(",").trim();
      return '<div class="row" data-i="' + i + '">' +
        '<div class="r-main">' + escapeHtml(main) + "</div>" +
        (sub ? '<div class="r-sub">' + escapeHtml(sub) + "</div>" : "") +
      "</div>";
    }).join("");
    els.results.classList.add("show");
  }

  function hideResults() { els.results.classList.remove("show"); }

  let lastResults = [];
  async function runSearch(query) {
    if (searchAbort) searchAbort.abort();
    searchAbort = new AbortController();
    els.spin.classList.add("show");
    try {
      const items = await forwardGeocode(query, searchAbort.signal);
      lastResults = items;
      renderResults(items);
    } catch (err) {
      if (err.name === "AbortError") return; // superseded by a newer keystroke
      els.results.innerHTML = '<div class="empty">' + escapeHtml(err.message) + "</div>";
      els.results.classList.add("show");
    } finally {
      els.spin.classList.remove("show");
    }
  }

  async function chooseResult(item) {
    hideResults();
    els.search.blur();
    mode = "pinned";
    following = false;
    const lat = parseFloat(item.lat), lon = parseFloat(item.lon);

    setPin(lat, lon);
    selfMove(() => map.flyTo([lat, lon], 16, { duration: 1.2 }));
    showLookingUp(true);
    updateFab();

    try {
      const address = await reverseGeocode(lat, lon);
      render(address, { pinned: true });
      if (lastFix) setStatus(prettyDistance(distanceMeters(lastFix, { lat, lon })), false);
      else setStatus("Searched place", false);
    } catch (err) {
      // Fall back to whatever the search result itself carried.
      if (item.address) render(item.address, { pinned: true });
      else { els.place.textContent = item.display_name || "That place"; els.breadcrumb.innerHTML = ""; }
      setStatus("Searched place", false);
    }
  }

  function backToMe() {
    hideResults();
    els.search.value = "";
    els.clear.classList.remove("show");
    clearPin();
    if (lastFix) {
      mode = "live";
      following = true;
      lastPanCenter = null;
      if (lastLiveAddress) render(lastLiveAddress, { pinned: false });
      setStatus("Live", true);
      selfMove(() => map.flyTo([lastFix.lat, lastFix.lon], Math.max(map.getZoom(), 15), { duration: 1.0 }));
    } else {
      mode = "idle";
    }
    updateFab();
  }

  // FAB doubles as "recenter on me" (live) and "back to my location" (pinned).
  function updateFab() {
    const useful = (mode === "pinned" && lastFix) || (mode === "live" && !following && lastFix);
    els.fab.classList.toggle("show", !!useful);
  }

  // ---------- Wire up ----------
  els.cta.addEventListener("click", locate);

  els.fab.addEventListener("click", function () {
    if (!lastFix) return;
    if (mode === "pinned") { backToMe(); return; }
    following = true;
    lastPanCenter = null;
    updateFab();
    selfMove(() => map.flyTo([lastFix.lat, lastFix.lon], Math.max(map.getZoom(), 15), { duration: 1.0 }));
  });

  els.search.addEventListener("input", function () {
    const query = els.search.value.trim();
    els.clear.classList.toggle("show", query.length > 0);
    if (searchTimer) clearTimeout(searchTimer);
    if (query.length < 3) { hideResults(); els.spin.classList.remove("show"); return; }
    searchTimer = setTimeout(() => runSearch(query), 400);
  });

  els.search.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      e.preventDefault();
      if (searchTimer) clearTimeout(searchTimer);
      const query = els.search.value.trim();
      if (query.length >= 2) runSearch(query);
    }
  });

  els.results.addEventListener("click", function (e) {
    const row = e.target.closest(".row");
    if (!row) return;
    const item = lastResults[parseInt(row.getAttribute("data-i"), 10)];
    if (item) chooseResult(item);
  });

  els.clear.addEventListener("click", function () {
    if (mode === "pinned") backToMe();
    else {
      els.search.value = "";
      els.clear.classList.remove("show");
      hideResults();
      els.search.focus();
    }
  });

  // Tapping the map dismisses the results list.
  document.getElementById("map").addEventListener("touchstart", hideResults, { passive: true });
  document.getElementById("map").addEventListener("mousedown", hideResults);

  initMap();
})();
</script>
</body>
</html>
