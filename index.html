<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Where Am I">
<meta name="theme-color" content="#0b0d17">
<title>What Neighborhood?</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  :root {
    --bg: #0b0d17;
    --accent: #6c8cff;
    --accent-2: #a06cff;
    --text: #f2f4ff;
    --muted: #9aa0bd;
    --good: #4fd18b;
    --warn: #ffcc66;
    --glass: rgba(19, 22, 38, 0.72);
    --glass-brd: rgba(255, 255, 255, 0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Map ---------- */
  #map {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 0;
  }
  /* Soften the CARTO attribution to fit the theme */
  .leaflet-control-attribution {
    background: rgba(11, 13, 23, 0.6) !important;
    color: #6b7091 !important;
    backdrop-filter: blur(6px);
    font-size: 10px !important;
  }
  .leaflet-control-attribution a { color: #8b90b8 !important; }
  .leaflet-bar a {
    background: var(--glass) !important;
    color: var(--text) !important;
    border-color: var(--glass-brd) !important;
    backdrop-filter: blur(10px);
  }

  /* A gentle vignette so the card edge reads against any map area */
  .scrim {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 46%;
    pointer-events: none;
    background: linear-gradient(to top, rgba(11,13,23,0.85) 0%, rgba(11,13,23,0.0) 100%);
    z-index: 400;
  }
  .scrim-top {
    position: fixed;
    left: 0; right: 0; top: 0;
    height: 120px;
    pointer-events: none;
    background: linear-gradient(to bottom, rgba(11,13,23,0.7) 0%, rgba(11,13,23,0.0) 100%);
    z-index: 400;
  }

  /* ---------- "You are here" marker ---------- */
  .me-dot {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--accent);
    border: 3px solid #fff;
    box-shadow: 0 0 0 2px rgba(108,140,255,0.6), 0 4px 12px rgba(0,0,0,0.5);
    position: relative;
  }
  .me-dot::after {
    content: "";
    position: absolute;
    inset: -11px;
    border-radius: 50%;
    background: rgba(108,140,255,0.45);
    animation: ping 2.2s cubic-bezier(0, 0, 0.2, 1) infinite;
    z-index: -1;
  }
  @keyframes ping {
    0%   { transform: scale(0.6); opacity: 0.8; }
    80%  { transform: scale(2.6); opacity: 0; }
    100% { transform: scale(2.6); opacity: 0; }
  }

  /* ---------- Top status pill ---------- */
  .toppill {
    position: fixed;
    top: calc(env(safe-area-inset-top) + 12px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: var(--glass);
    border: 1px solid var(--glass-brd);
    border-radius: 999px;
    backdrop-filter: blur(14px);
    font-size: 13px;
    color: var(--muted);
    box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    white-space: nowrap;
    transition: opacity 0.3s ease;
  }
  .toppill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .toppill .dot.live {
    background: var(--good);
    animation: blink 2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.35;} }

  /* ---------- Welcome toast ---------- */
  .toast {
    position: fixed;
    top: calc(env(safe-area-inset-top) + 58px);
    left: 50%;
    transform: translateX(-50%) translateY(-14px);
    z-index: 600;
    padding: 12px 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #0b0d17;
    font-weight: 800;
    font-size: 15px;
    border-radius: 999px;
    box-shadow: 0 12px 34px rgba(108,140,255,0.45);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.2,0.9,0.3,1.3);
    white-space: nowrap;
    max-width: 90vw;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---------- Recenter FAB ---------- */
  .fab {
    position: fixed;
    right: 16px;
    bottom: calc(env(safe-area-inset-bottom) + 210px);
    z-index: 550;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--glass);
    border: 1px solid var(--glass-brd);
    backdrop-filter: blur(14px);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 26px rgba(0,0,0,0.4);
    cursor: pointer;
    opacity: 0;
    transform: scale(0.7);
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.2,0.9,0.3,1.3);
  }
  .fab.show { opacity: 1; transform: scale(1); pointer-events: auto; }
  .fab:active { transform: scale(0.9); }
  .fab svg { width: 24px; height: 24px; stroke: var(--accent); fill: none; stroke-width: 2; }

  /* ---------- Bottom card ---------- */
  .card {
    position: fixed;
    left: 12px; right: 12px;
    bottom: calc(env(safe-area-inset-bottom) + 12px);
    z-index: 500;
    background: var(--glass);
    border: 1px solid var(--glass-brd);
    border-radius: 26px;
    backdrop-filter: blur(22px) saturate(1.2);
    -webkit-backdrop-filter: blur(22px) saturate(1.2);
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    padding: 20px 22px 18px;
    max-width: 560px;
    margin: 0 auto;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  }

  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .place {
    font-size: clamp(30px, 9vw, 46px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    word-break: break-word;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .place .flag { font-size: 0.85em; line-height: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4)); }
  .place.changing { animation: popIn 0.5s cubic-bezier(0.2,0.9,0.3,1.3); }
  @keyframes popIn {
    0%   { transform: translateY(10px) scale(0.96); opacity: 0; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }

  .breadcrumb {
    margin-top: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }
  .breadcrumb .crumb {
    font-size: 13px;
    color: var(--text);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 4px 10px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .breadcrumb .crumb .lbl {
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-right: 5px;
  }
  .breadcrumb .sep { color: var(--muted); opacity: 0.5; font-size: 12px; }

  .cta {
    margin-top: 16px;
    width: 100%;
    appearance: none;
    border: none;
    border-radius: 16px;
    padding: 16px;
    font-size: 17px;
    font-weight: 800;
    font-family: inherit;
    color: #0b0d17;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    cursor: pointer;
    box-shadow: 0 10px 26px rgba(108,140,255,0.4);
    transition: transform 0.08s ease;
  }
  .cta:active { transform: scale(0.98); }
  .cta.secondary {
    background: rgba(255,255,255,0.06);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: none;
    font-weight: 600;
    font-size: 15px;
    padding: 13px;
    margin-top: 10px;
  }

  .hint {
    margin-top: 12px;
    font-size: 14px;
    color: var(--muted);
    line-height: 1.5;
  }
  .hint.error { color: var(--warn); }

  /* Shimmer while looking up */
  .shimmer {
    display: inline-block;
    height: 0.9em;
    width: 62%;
    border-radius: 8px;
    background: linear-gradient(90deg, rgba(255,255,255,0.06) 25%, rgba(255,255,255,0.16) 37%, rgba(255,255,255,0.06) 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
  }
  @keyframes shimmer { 0%{background-position:100% 0;} 100%{background-position:-100% 0;} }

  .hidden { display: none !important; }
</style>
</head>
<body>
  <div id="map"></div>
  <div class="scrim"></div>
  <div class="scrim-top"></div>

  <div class="toppill" id="toppill">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Ready when you are</span>
  </div>

  <div class="toast" id="toast"></div>

  <button class="fab" id="recenter" aria-label="Recenter map">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"></circle><path d="M12 2v3.5M12 18.5V22M2 12h3.5M18.5 12H22"></path></svg>
  </button>

  <div class="card" id="card">
    <div class="eyebrow" id="eyebrow">You are in</div>
    <div class="place" id="place">Where am I?</div>
    <div class="breadcrumb" id="breadcrumb"></div>
    <button class="cta" id="cta">Find my neighborhood</button>
    <div class="hint" id="hint">See exactly which neighborhood you're standing in — anywhere in the world.</div>
  </div>

<script>
(function () {
  "use strict";

  // Address fields from most-specific to broadest, with the label shown to the user.
  // Nominatim returns different keys per country, so we probe several per tier and
  // take the first present, then de-duplicate identical values across tiers.
  const TIERS = [
    { label: "Sub-area",     keys: ["neighbourhood"] },
    { label: "Neighborhood", keys: ["quarter"] },
    { label: "Area",         keys: ["suburb", "city_district", "borough"] },
    { label: "City",         keys: ["city", "town", "village", "municipality", "hamlet"] },
    { label: "Region",       keys: ["state", "region", "province"] },
    { label: "Country",      keys: ["country"] }
  ];

  const $ = (id) => document.getElementById(id);
  const els = {
    map: $("map"), place: $("place"), eyebrow: $("eyebrow"), breadcrumb: $("breadcrumb"),
    cta: $("cta"), hint: $("hint"), toppill: $("toppill"), statusDot: $("statusDot"),
    statusText: $("statusText"), toast: $("toast"), recenter: $("recenter")
  };

  const MIN_MOVE_METERS = 35;   // re-geocode only after moving this far
  const MIN_INTERVAL_MS = 8000; // ...or after this long (respects Nominatim rate limit)

  let map, meMarker, accuracyCircle;
  let watchId = null;
  let lastFix = null;
  let lastGeocodeTime = 0;
  let following = true;
  let topPlaceName = null;   // headline place, to detect crossing into a new area
  let hasCard = false;       // have we rendered a real result yet
  let toastTimer = null;

  // ---------- Map setup ----------
  function initMap() {
    map = L.map("map", {
      zoomControl: false,
      attributionControl: true,
      worldCopyJump: true
    }).setView([20, 0], 2);

    L.control.zoom({ position: "topright" }).addTo(map);

    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      attribution: '&copy; <a href="https://openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: "abcd",
      maxZoom: 20
    }).addTo(map);

    // When the user drags the map themselves, stop auto-following and offer recenter.
    map.on("dragstart", function () {
      if (!lastFix) return;
      following = false;
      els.recenter.classList.add("show");
    });
  }

  // ---------- Helpers ----------
  function flagEmoji(cc) {
    if (!cc || cc.length !== 2) return "";
    const base = 0x1F1E6;
    return cc.toUpperCase().replace(/./g, (ch) =>
      String.fromCodePoint(base + ch.charCodeAt(0) - 65));
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  function distanceMeters(a, b) {
    const R = 6371000;
    const toRad = (d) => d * Math.PI / 180;
    const dLat = toRad(b.lat - a.lat);
    const dLon = toRad(b.lon - a.lon);
    const lat1 = toRad(a.lat), lat2 = toRad(b.lat);
    const h = Math.sin(dLat / 2) ** 2 +
              Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(h));
  }

  function buildChain(address) {
    const chain = [];
    const seen = new Set();
    for (const tier of TIERS) {
      for (const key of tier.keys) {
        const value = address[key];
        if (value && !seen.has(value)) {
          seen.add(value);
          chain.push({ label: tier.label, value: value });
          break;
        }
      }
    }
    return chain;
  }

  function setStatus(text, live) {
    els.statusText.textContent = text;
    els.statusDot.className = "dot" + (live ? " live" : "");
  }

  function showToast(msg) {
    els.toast.textContent = msg;
    els.toast.classList.add("show");
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => els.toast.classList.remove("show"), 3200);
  }

  // ---------- Rendering ----------
  function render(address) {
    const chain = buildChain(address);
    els.cta.classList.add("hidden");

    if (chain.length === 0) {
      els.eyebrow.textContent = "Hmm";
      els.place.textContent = "Unknown area";
      els.breadcrumb.innerHTML = "";
      els.hint.textContent = "No named place here in OpenStreetMap.";
      els.hint.classList.remove("hidden");
      return;
    }
    els.hint.classList.add("hidden");
    els.eyebrow.textContent = "You are in";

    const flag = flagEmoji(address.country_code);
    const head = chain[0].value;

    // Headline, with a pop animation whenever it becomes a new place.
    const changed = head !== topPlaceName;
    els.place.innerHTML = escapeHtml(head) +
      (flag ? ' <span class="flag">' + flag + "</span>" : "");
    if (changed) {
      els.place.classList.remove("changing");
      void els.place.offsetWidth; // restart animation
      els.place.classList.add("changing");
      if (hasCard) showToast("Welcome to " + head + (flag ? " " + flag : ""));
    }
    topPlaceName = head;

    // Breadcrumb from specific → broad.
    els.breadcrumb.innerHTML = chain.map((c, i) =>
      (i > 0 ? '<span class="sep">›</span>' : "") +
      '<span class="crumb"><span class="lbl">' + c.label + "</span>" +
      escapeHtml(c.value) + "</span>"
    ).join("");

    hasCard = true;
  }

  function showLookingUp() {
    els.eyebrow.textContent = "Locating";
    els.place.innerHTML = '<span class="shimmer"></span>';
    els.breadcrumb.innerHTML = "";
    els.hint.classList.add("hidden");
  }

  // ---------- Marker ----------
  function updateMarker(lat, lon, accuracy) {
    const latlng = [lat, lon];
    if (!meMarker) {
      const icon = L.divIcon({
        className: "",
        html: '<div class="me-dot"></div>',
        iconSize: [22, 22],
        iconAnchor: [11, 11]
      });
      meMarker = L.marker(latlng, { icon: icon, interactive: false, keyboard: false }).addTo(map);
      accuracyCircle = L.circle(latlng, {
        radius: accuracy, color: "#6c8cff", weight: 1,
        fillColor: "#6c8cff", fillOpacity: 0.10, opacity: 0.35, interactive: false
      }).addTo(map);
    } else {
      meMarker.setLatLng(latlng);
      accuracyCircle.setLatLng(latlng);
      accuracyCircle.setRadius(accuracy);
    }
  }

  function flyToMe(lat, lon, firstTime) {
    if (firstTime) {
      map.flyTo([lat, lon], 15, { duration: 1.6 });
    } else if (following) {
      map.panTo([lat, lon], { animate: true, duration: 0.8 });
    }
  }

  // ---------- Geocoding ----------
  async function reverseGeocode(lat, lon) {
    const url = "https://nominatim.openstreetmap.org/reverse" +
      "?format=jsonv2&zoom=18&addressdetails=1&accept-language=en" +
      "&lat=" + encodeURIComponent(lat) + "&lon=" + encodeURIComponent(lon);
    const res = await fetch(url, { headers: { "Accept": "application/json" } });
    if (!res.ok) throw new Error("Lookup failed (" + res.status + ")");
    const data = await res.json();
    if (!data || !data.address) throw new Error("No address found for this spot.");
    return data.address;
  }

  // ---------- Position handling ----------
  async function handlePosition(pos) {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    const accuracy = Math.max(1, pos.coords.accuracy || 25);
    const now = Date.now();
    const firstTime = !lastFix;

    updateMarker(lat, lon, accuracy);
    flyToMe(lat, lon, firstTime);
    setStatus((watchId !== null ? "Live · " : "") + "accurate to ~" + Math.round(accuracy) + " m",
              watchId !== null);

    // Skip redundant reverse-geocode calls when barely moved and recently fetched.
    if (!firstTime && lastFix) {
      const moved = distanceMeters(lastFix, { lat, lon });
      if (moved < MIN_MOVE_METERS && (now - lastGeocodeTime) < MIN_INTERVAL_MS) return;
    }

    if (firstTime) showLookingUp();
    try {
      const address = await reverseGeocode(lat, lon);
      lastFix = { lat, lon };
      lastGeocodeTime = Date.now();
      render(address);
    } catch (err) {
      if (!hasCard) {
        els.eyebrow.textContent = "Hmm";
        els.place.textContent = "Couldn't look that up";
        els.hint.textContent = err.message + " Try again in a moment.";
        els.hint.classList.remove("hidden");
      }
      setStatus(err.message, false);
    }
  }

  function handleError(err) {
    let msg;
    switch (err.code) {
      case err.PERMISSION_DENIED:
        msg = "Location permission denied. Enable it in Settings → Safari and reload.";
        break;
      case err.POSITION_UNAVAILABLE:
        msg = "Couldn't determine your location. Try again in a moment.";
        break;
      case err.TIMEOUT:
        msg = "Location request timed out.";
        break;
      default:
        msg = "Something went wrong getting your location.";
    }
    setStatus("Location off", false);
    els.eyebrow.textContent = "Heads up";
    els.place.textContent = "Location needed";
    els.hint.textContent = msg;
    els.hint.classList.remove("hidden");
    els.cta.classList.remove("hidden");
    els.cta.textContent = "Try again";
  }

  const geoOptions = { enableHighAccuracy: true, timeout: 15000, maximumAge: 4000 };

  function startWatch() {
    if (watchId !== null) return;
    watchId = navigator.geolocation.watchPosition(handlePosition, handleError, geoOptions);
  }

  function locate() {
    if (!("geolocation" in navigator)) {
      handleError({ code: 0 });
      return;
    }
    setStatus("Getting your location…", false);
    showLookingUp();
    navigator.geolocation.getCurrentPosition(function (pos) {
      handlePosition(pos);
      startWatch();
    }, handleError, geoOptions);
  }

  // ---------- Wire up ----------
  els.cta.addEventListener("click", locate);
  els.recenter.addEventListener("click", function () {
    if (!lastFix) return;
    following = true;
    els.recenter.classList.remove("show");
    map.flyTo([lastFix.lat, lastFix.lon], Math.max(map.getZoom(), 15), { duration: 1.0 });
  });

  initMap();
})();
</script>
</body>
</html>
